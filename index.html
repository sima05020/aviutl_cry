<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AviUtl 泣きエフェクトメーカー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c0c1a;
      color: #c8d4e8;
      font-family: 'Segoe UI', 'Meiryo', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #111130 0%, #1a1050 100%);
      padding: 12px 20px;
      border-bottom: 2px solid #3a6aaa;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.2rem;
      color: #7dd8ff;
      text-shadow: 0 0 12px rgba(125,216,255,0.6);
      letter-spacing: 0.03em;
    }
    header .subtitle {
      font-size: 0.75rem;
      color: #5a80a8;
      margin-left: 4px;
    }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== Sidebar ===== */
    #sidebar {
      width: 240px;
      background: #0f0f22;
      border-right: 1px solid #1e2a3e;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .section {
      padding: 12px 14px;
      border-bottom: 1px solid #1a2030;
    }
    .section h3 {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #5090c0;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      margin-bottom: 7px;
      gap: 6px;
    }
    .row label {
      font-size: 0.78rem;
      color: #8090a8;
      width: 72px;
      flex-shrink: 0;
    }
    .row input[type="range"] {
      flex: 1;
      accent-color: #7dd8ff;
      height: 3px;
    }
    .row .val {
      font-size: 0.72rem;
      color: #7dd8ff;
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }
    .row input[type="checkbox"] {
      accent-color: #7dd8ff;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
    .row input[type="color"] {
      width: 32px;
      height: 22px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      background: none;
    }

    .type-group {
      display: flex;
      gap: 4px;
      margin-bottom: 2px;
    }
    .type-btn {
      flex: 1;
      padding: 5px 4px;
      font-size: 0.70rem;
      border: 1px solid #2a3a55;
      background: #111a2e;
      color: #7090b0;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
      transition: all 0.12s;
    }
    .type-btn:hover { border-color: #4a80b8; color: #a0c8e8; }
    .type-btn.active {
      background: #1a3a6a;
      border-color: #7dd8ff;
      color: #7dd8ff;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 5px;
      border: 1px solid #2a3a55;
      background: #111a2e;
      color: #8090a8;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.80rem;
      text-align: center;
      transition: all 0.12s;
    }
    .btn:hover { border-color: #4a80b8; color: #c0d8f0; }
    .btn.primary {
      background: #1a3050;
      border-color: #4a90d0;
      color: #7dd8ff;
    }
    .btn.primary:hover { background: #1e3a60; border-color: #7dd8ff; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn.danger { border-color: #5a2a2a; color: #c07070; }
    .btn.danger:hover { background: #2a1010; border-color: #c07070; }

    #progress-wrap {
      display: none;
      padding: 10px 14px;
      background: #0a0a1a;
      border-bottom: 1px solid #1a2030;
    }
    #progress-wrap p {
      font-size: 0.75rem;
      color: #7dd8ff;
      margin-bottom: 5px;
    }
    .pbar-bg {
      height: 4px;
      background: #1a2a3a;
      border-radius: 2px;
      overflow: hidden;
    }
    .pbar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4a90ff, #7dd8ff);
      border-radius: 2px;
      transition: width 0.1s;
      width: 0%;
    }

    .stat {
      font-size: 0.70rem;
      color: #3a5070;
      padding: 4px 14px 8px;
      text-align: center;
    }

    /* ===== Canvas area ===== */
    #canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: repeating-conic-gradient(#0e0e1e 0% 25%, #0a0a16 0% 50%) 0 0 / 24px 24px;
      overflow: auto;
      position: relative;
    }

    #upload-zone {
      border: 2px dashed #2a4a6a;
      border-radius: 12px;
      padding: 60px 48px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      max-width: 440px;
    }
    #upload-zone:hover, #upload-zone.drag-over {
      border-color: #7dd8ff;
      background: rgba(125,216,255,0.04);
    }
    #upload-zone .icon { font-size: 3rem; margin-bottom: 12px; }
    #upload-zone p { color: #5070a0; font-size: 0.88rem; margin-bottom: 8px; }
    #upload-zone .btn-upload {
      display: inline-block;
      padding: 8px 20px;
      border: 1px solid #3a6090;
      border-radius: 5px;
      background: #1a2a44;
      color: #7dd8ff;
      cursor: pointer;
      font-size: 0.85rem;
      margin-top: 4px;
    }
    #upload-zone .btn-upload:hover { background: #1e3454; border-color: #7dd8ff; }

    #canvas-wrapper {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #preview-canvas {
      display: block;
      cursor: crosshair;
      border: 1px solid #2a3a55;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }
    #canvas-hint {
      font-size: 0.72rem;
      color: #3a5070;
    }
    #canvas-hint span { color: #5a8ab0; }

    #file-input { display: none; }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
    <circle cx="11" cy="8" r="6" fill="#4a90d0" opacity="0.8"/>
    <ellipse cx="11" cy="17" rx="3" ry="5" fill="#7dd8ff" opacity="0.7"/>
  </svg>
  <h1>AviUtl 泣きエフェクトメーカー</h1>
  <span class="subtitle">Crying Effect Generator</span>
</header>

<main>
  <aside id="sidebar">

    <div class="section">
      <h3>涙のタイプ</h3>
      <div class="type-group">
        <div class="type-btn active" onclick="setType('circle',this)">丸<br>パーティクル</div>
        <div class="type-btn" onclick="setType('wave',this)">波線<br>ラスター</div>
        <div class="type-btn" onclick="setType('both',this)">両方</div>
      </div>
    </div>

    <div class="section">
      <h3>パーティクル</h3>
      <div class="row">
        <label>丸スタイル</label>
        <div class="type-group" style="flex:1">
          <div class="type-btn tgl-style active" onclick="setToggle('circleStyle','simple','tgl-style',this)">単色</div>
          <div class="type-btn tgl-style" onclick="setToggle('circleStyle','glow','tgl-style',this)">グロー</div>
        </div>
      </div>
      <div class="row">
        <label>軌道</label>
        <div class="type-group" style="flex:1">
          <div class="type-btn tgl-traj active" onclick="setToggle('trajectory','fall','tgl-traj',this)">落下</div>
          <div class="type-btn tgl-traj" onclick="setToggle('trajectory','arc','tgl-traj',this)">放物線</div>
        </div>
      </div>
      <div class="row">
        <label>速度倍率</label>
        <div class="type-group" style="flex:1">
          <div class="type-btn tgl-smult" onclick="setToggle('speedMult',1,'tgl-smult',this)">通常</div>
          <div class="type-btn tgl-smult active" onclick="setToggle('speedMult',3,'tgl-smult',this)">高速</div>
          <div class="type-btn tgl-smult" onclick="setToggle('speedMult',6,'tgl-smult',this)">超高速</div>
        </div>
      </div>
      <div class="row">
        <label>発生率</label>
        <input type="range" min="1" max="15" value="4" oninput="p.spawnRate=+this.value;document.getElementById('sv-spawn').textContent=this.value">
        <span class="val" id="sv-spawn">4</span>
      </div>
      <div class="row">
        <label>サイズ</label>
        <input type="range" min="1" max="24" value="6" oninput="p.particleSize=+this.value;document.getElementById('sv-size').textContent=this.value">
        <span class="val" id="sv-size">6</span>
      </div>
      <div class="row">
        <label>落下速度</label>
        <input type="range" min="1" max="12" value="4" oninput="p.fallSpeed=+this.value;document.getElementById('sv-speed').textContent=this.value">
        <span class="val" id="sv-speed">4</span>
      </div>
      <div class="row">
        <label>重力</label>
        <input type="range" min="0" max="20" value="5" oninput="p.gravity=+this.value/100;document.getElementById('sv-grav').textContent=this.value">
        <span class="val" id="sv-grav">5</span>
      </div>
      <div class="row">
        <label>涙の色</label>
        <input type="color" value="#7dd8ff" oninput="p.tearColor=this.value">
      </div>
      <div class="row">
        <label>透明度</label>
        <input type="range" min="20" max="100" value="80" oninput="p.tearAlpha=+this.value/100;document.getElementById('sv-alpha').textContent=this.value">
        <span class="val" id="sv-alpha">80</span>
      </div>
    </div>

    <div class="section">
      <h3>ラスター（波歪み）</h3>
      <div class="row">
        <label>画像に適用</label>
        <input type="checkbox" onchange="p.rasterOnImage=this.checked">
      </div>
      <div class="row">
        <label>波の方向</label>
        <div class="type-group" style="flex:1">
          <div class="type-btn tgl-rdir active" onclick="setToggle('rasterDir','horizontal','tgl-rdir',this)">横波</div>
          <div class="type-btn tgl-rdir" onclick="setToggle('rasterDir','vertical','tgl-rdir',this)">縦波</div>
        </div>
      </div>
      <div class="row">
        <label>振幅</label>
        <input type="range" min="0" max="30" value="6" oninput="p.rasterAmp=+this.value;document.getElementById('sv-ramp').textContent=this.value">
        <span class="val" id="sv-ramp">6</span>
      </div>
      <div class="row">
        <label>波長</label>
        <input type="range" min="10" max="200" value="60" oninput="p.rasterWave=+this.value;document.getElementById('sv-rwav').textContent=this.value">
        <span class="val" id="sv-rwav">60</span>
      </div>
      <div class="row">
        <label>速度</label>
        <input type="range" min="1" max="20" value="6" oninput="p.rasterSpeed=+this.value;document.getElementById('sv-rspd').textContent=this.value">
        <span class="val" id="sv-rspd">6</span>
      </div>
    </div>

    <div class="section">
      <h3>GIF出力設定</h3>
      <div class="row">
        <label>再生速度</label>
        <input type="range" min="1" max="8" value="2" step="0.5" oninput="p.gifSpeedMult=+this.value;document.getElementById('sv-gspd').textContent=this.value+'x'">
        <span class="val" id="sv-gspd">2x</span>
      </div>
      <div class="row">
        <label>フレーム数</label>
        <input type="range" min="20" max="150" value="60" oninput="p.gifFrames=+this.value;document.getElementById('sv-gf').textContent=this.value">
        <span class="val" id="sv-gf">60</span>
      </div>
      <div class="row">
        <label>FPS</label>
        <input type="range" min="8" max="30" value="20" oninput="p.gifFps=+this.value;document.getElementById('sv-fps').textContent=this.value">
        <span class="val" id="sv-fps">20</span>
      </div>
      <div class="row">
        <label>品質</label>
        <input type="range" min="1" max="20" value="8" oninput="p.gifQuality=+this.value;document.getElementById('sv-gq').textContent=this.value">
        <span class="val" id="sv-gq">8</span>
      </div>
    </div>

    <div class="section">
      <button class="btn primary" id="btn-gif" disabled onclick="exportGIF()">💾 GIF出力</button>
      <button class="btn primary" id="btn-png" disabled onclick="exportPNG()">🖼 PNG出力（現フレーム）</button>
      <button class="btn" onclick="clearPoints()">発生点をリセット</button>
      <button class="btn danger" onclick="resetAll()">画像をリセット</button>
    </div>

    <div id="progress-wrap">
      <p id="progress-label">GIF生成中… 0%</p>
      <div class="pbar-bg"><div class="pbar-fill" id="pbar"></div></div>
    </div>

    <div class="stat" id="stat">粒子: 0 / 発生点: 0</div>

  </aside>

  <section id="canvas-area">
    <div id="upload-zone">
      <div class="icon">💧</div>
      <p>画像をここにドロップ</p>
      <p>または</p>
      <label class="btn-upload">ファイルを選択
        <input type="file" id="file-input" accept="image/*">
      </label>
      <p style="margin-top:14px;font-size:0.72rem;color:#3a5070">Ctrl+V でクリップボードから貼り付け可能</p>
    </div>

    <div id="canvas-wrapper">
      <canvas id="preview-canvas"></canvas>
      <p id="canvas-hint">
        <span>左クリック</span> → 涙の発生点を追加
        <span>右クリック</span> → 発生点を削除
      </p>
    </div>
  </section>
</main>

<script>
// ============================================================
// Parameters
// ============================================================
const p = {
  tearType:     'circle',
  circleStyle:  'simple',   // 'simple' | 'glow'
  trajectory:   'fall',     // 'fall' | 'arc'
  speedMult:    2,
  spawnRate:    4,
  particleSize: 6,
  fallSpeed:    4,
  gravity:      0.05,
  tearColor:    '#7dd8ff',
  tearAlpha:    0.80,
  rasterOnImage: false,
  rasterDir:    'horizontal', // 'horizontal' | 'vertical'
  rasterAmp:    6,
  rasterWave:   60,
  rasterSpeed:  6,
  gifSpeedMult: 2,
  gifFrames:    60,
  gifFps:       20,
  gifQuality:   8,
};

// ============================================================
// State
// ============================================================
let sourceImage = null;
let tearPoints  = [];
let particles   = [];
let frameCount  = 0;
let rafId       = null;

const MAX_W = 720;
const MAX_H = 540;
const MAX_PARTICLES = 600;

const canvas  = document.getElementById('preview-canvas');
const ctx     = canvas.getContext('2d');

// ============================================================
// Color helpers
// ============================================================
function hexToRgb(hex) {
  const v = parseInt(hex.replace('#',''), 16);
  return [(v>>16)&255, (v>>8)&255, v&255];
}

// ============================================================
// Circle Particle
// ============================================================
class CircleParticle {
  constructor(ox, oy, arcDir = 'both') {
    this.x   = ox + (Math.random() - 0.5) * 10;
    this.y   = oy;
    this.r   = (0.6 + Math.random() * 0.8) * p.particleSize;
    this.age = 0;
    this.color = p.tearColor;
    this.baseAlpha = p.tearAlpha;
    this.style = p.circleStyle;
    this.arcDir = arcDir; // 'left' | 'right' | 'both'

    if (p.trajectory === 'arc') {
      // 少し上に飛んでから放物線を描いて落下
      // dir: 'left'=-1, 'right'=+1, 'both'=ランダム
      const sign = this.arcDir === 'left' ? -1 : this.arcDir === 'right' ? 1 : (Math.random() < 0.5 ? -1 : 1);
      const spread = 0.2 + Math.random() * 0.3; // 方向への散らばり幅
      const speed  = (0.8 + Math.random() * 0.8) * p.fallSpeed * 0.4;
      this.vx = sign * spread * speed * 3;
      this.vy = -(0.6 + Math.random() * 0.8) * p.fallSpeed * 0.5; // 上向き初速
      this.maxAge = 60 + Math.random() * 60;
    } else {
      this.vx = (Math.random() - 0.5) * 0.6;
      this.vy = (0.4 + Math.random() * 0.6) * p.fallSpeed * 0.5;
      this.maxAge = 45 + Math.random() * 55;
    }
  }

  update() {
    this.x  += this.vx;
    this.y  += this.vy;
    this.vy += p.gravity * p.fallSpeed;
    this.vx *= 0.97;
    this.age++;
    return this.age < this.maxAge && this.y < canvas.height + 30;
  }

  draw(ctx) {
    const t = this.age / this.maxAge;
    const alpha = this.baseAlpha * Math.max(0, 1 - t);
    const [r, g, b] = hexToRgb(this.color);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);

    if (this.style === 'glow') {
      const grad = ctx.createRadialGradient(
        this.x - this.r * 0.25, this.y - this.r * 0.25, this.r * 0.1,
        this.x, this.y, this.r
      );
      grad.addColorStop(0, `rgba(255,255,255,0.9)`);
      grad.addColorStop(0.3, `rgba(${r},${g},${b},0.95)`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0.3)`);
      ctx.fillStyle = grad;
    } else {
      ctx.fillStyle = `rgb(${r},${g},${b})`;
    }

    ctx.fill();
    ctx.restore();
  }
}

// ============================================================
// Wave Line Particle (ラスター風)
// ============================================================
class WaveParticle {
  constructor(ox, oy) {
    this.x   = ox + (Math.random() - 0.5) * 8;
    this.y   = oy;
    this.vy  = (0.3 + Math.random() * 0.5) * p.fallSpeed * 0.4;
    this.h   = 28 + Math.random() * 20;
    this.w   = 3 + Math.random() * 4;
    this.maxAge = 55 + Math.random() * 45;
    this.age = 0;
    this.phase = Math.random() * Math.PI * 2;
    this.color = p.tearColor;
    this.baseAlpha = p.tearAlpha;
  }

  update() {
    this.y  += this.vy;
    this.vy += p.gravity * p.fallSpeed * 0.6;
    this.age++;
    return this.age < this.maxAge && this.y < canvas.height + 60;
  }

  draw(ctx) {
    const t = this.age / this.maxAge;
    const alpha = this.baseAlpha * Math.max(0, 1 - t);
    const [r, g, b] = hexToRgb(this.color);

    ctx.save();
    ctx.globalAlpha = alpha;

    const amp = 2.5;
    const wl  = 10;

    for (let dy = 0; dy < this.h; dy++) {
      const xOff = amp * Math.sin(2 * Math.PI * dy / wl + this.phase + this.age * 0.12);
      const fade = 1 - (dy / this.h) * 0.4;
      ctx.fillStyle = `rgba(${r},${g},${b},${fade})`;
      ctx.fillRect(this.x + xOff, this.y + dy, this.w, 1.5);
    }

    ctx.restore();
  }
}

// ============================================================
// Raster distortion (wave applied row-by-row)
// ============================================================
function applyRaster(targetCtx, w, h, amp, wl, phase, dir) {
  if (amp < 0.5) return;
  const src = targetCtx.getImageData(0, 0, w, h);
  const out = targetCtx.createImageData(w, h);
  const s = src.data, d = out.data;

  if (dir === 'vertical') {
    // 縦波: 各列を Y 方向にシフト
    for (let x = 0; x < w; x++) {
      const shift = Math.round(amp * Math.sin(2 * Math.PI * x / wl + phase));
      for (let y = 0; y < h; y++) {
        const sy = y - shift;
        const di = (y * w + x) * 4;
        if (sy >= 0 && sy < h) {
          const si = (sy * w + x) * 4;
          d[di]   = s[si];
          d[di+1] = s[si+1];
          d[di+2] = s[si+2];
          d[di+3] = s[si+3];
        }
      }
    }
  } else {
    // 横波: 各行を X 方向にシフト
    for (let y = 0; y < h; y++) {
      const shift = Math.round(amp * Math.sin(2 * Math.PI * y / wl + phase));
      for (let x = 0; x < w; x++) {
        const sx = x - shift;
        const di = (y * w + x) * 4;
        if (sx >= 0 && sx < w) {
          const si = (y * w + sx) * 4;
          d[di]   = s[si];
          d[di+1] = s[si+1];
          d[di+2] = s[si+2];
          d[di+3] = s[si+3];
        }
      }
    }
  }
  targetCtx.putImageData(out, 0, 0);
}

// ============================================================
// Spawn
// ============================================================
function spawnParticles() {
  if (!tearPoints.length) return;
  for (const pt of tearPoints) {
    if (Math.random() < p.spawnRate / 12) {
      const useBoth   = p.tearType === 'both';
      const useWave   = p.tearType === 'wave';
      const useCircle = p.tearType === 'circle';

      if (useCircle || (useBoth && Math.random() < 0.5)) {
        particles.push(new CircleParticle(pt.x, pt.y, pt.arcDir));
      } else if (useWave || useBoth) {
        particles.push(new WaveParticle(pt.x, pt.y));
      }
    }
  }
  if (particles.length > MAX_PARTICLES) {
    particles.splice(0, particles.length - MAX_PARTICLES);
  }
}

// ============================================================
// Render
// ============================================================
function renderToContext(targetCtx, targetCanvas, t) {
  targetCtx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
  if (!sourceImage) return;

  targetCtx.drawImage(sourceImage, 0, 0, targetCanvas.width, targetCanvas.height);

  if (p.rasterOnImage && p.rasterAmp > 0) {
    const phase = t * p.rasterSpeed * 0.05;
    applyRaster(targetCtx, targetCanvas.width, targetCanvas.height, p.rasterAmp, p.rasterWave, phase, p.rasterDir);
  }

  for (const part of particles) part.draw(targetCtx);
}

function drawMarkers() {
  const isArc = p.trajectory === 'arc';
  for (const pt of tearPoints) {
    ctx.save();
    ctx.strokeStyle = 'rgba(125,216,255,0.85)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, 9, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(125,216,255,0.4)';
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, 3, 0, Math.PI * 2);
    ctx.fill();

    // 放物線モード時は方向ラベルを表示
    if (isArc) {
      const label = ARC_DIR_LABEL[pt.arcDir] || '↔';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillStyle = 'rgba(125,216,255,0.95)';
      ctx.fillText(label, pt.x, pt.y - 11);
    }

    ctx.restore();
  }
}

// ============================================================
// Animation loop
// ============================================================
function tick() {
  frameCount++;
  for (let s = 0; s < p.speedMult; s++) {
    spawnParticles();
    particles = particles.filter(pt => pt.update());
  }
  renderToContext(ctx, canvas, frameCount);
  drawMarkers();
  document.getElementById('stat').textContent =
    `粒子: ${particles.length} / 発生点: ${tearPoints.length}`;
  rafId = requestAnimationFrame(tick);
}

// ============================================================
// Load image
// ============================================================
function loadImage(src) {
  const img = new Image();
  img.onload = () => {
    sourceImage = img;

    const scale = Math.min(MAX_W / img.naturalWidth, MAX_H / img.naturalHeight, 1);
    canvas.width  = Math.round(img.naturalWidth  * scale);
    canvas.height = Math.round(img.naturalHeight * scale);

    document.getElementById('upload-zone').style.display   = 'none';
    document.getElementById('canvas-wrapper').style.display = 'flex';
    document.getElementById('btn-gif').disabled = false;
    document.getElementById('btn-png').disabled = false;

    tearPoints = [];
    particles  = [];
    frameCount = 0;

    if (rafId) cancelAnimationFrame(rafId);
    tick();
  };
  img.src = src;
}

function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => loadImage(e.target.result);
  reader.readAsDataURL(file);
}

// ============================================================
// Controls
// ============================================================
function setType(type, btn) {
  p.tearType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function setToggle(paramKey, value, groupClass, btn) {
  p[paramKey] = value;
  document.querySelectorAll('.' + groupClass).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function clearPoints() {
  tearPoints = [];
}

function resetAll() {
  if (rafId) cancelAnimationFrame(rafId);
  sourceImage = null;
  tearPoints  = [];
  particles   = [];
  document.getElementById('upload-zone').style.display   = '';
  document.getElementById('canvas-wrapper').style.display = 'none';
  document.getElementById('btn-gif').disabled = true;
  document.getElementById('btn-png').disabled = true;
}

// ============================================================
// Canvas interaction
// ============================================================
const ARC_DIR_CYCLE = ['both', 'left', 'right'];
const ARC_DIR_LABEL = { both: '↔', left: '←', right: '→' };

canvas.addEventListener('click', e => {
  const r  = canvas.getBoundingClientRect();
  const sx = canvas.width  / r.width;
  const sy = canvas.height / r.height;
  const mx = (e.clientX - r.left) * sx;
  const my = (e.clientY - r.top)  * sy;

  // 既存点の近くをクリックした場合は arcDir を切り替える
  let nearest = -1, nearestD = 16;
  for (let i = 0; i < tearPoints.length; i++) {
    const d = Math.hypot(tearPoints[i].x - mx, tearPoints[i].y - my);
    if (d < nearestD) { nearestD = d; nearest = i; }
  }
  if (nearest >= 0) {
    const pt  = tearPoints[nearest];
    const cur = ARC_DIR_CYCLE.indexOf(pt.arcDir);
    pt.arcDir = ARC_DIR_CYCLE[(cur + 1) % ARC_DIR_CYCLE.length];
    return;
  }

  // 新しい発生点を追加
  tearPoints.push({ x: mx, y: my, arcDir: 'both' });
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const r  = canvas.getBoundingClientRect();
  const sx = canvas.width  / r.width;
  const sy = canvas.height / r.height;
  const mx = (e.clientX - r.left) * sx;
  const my = (e.clientY - r.top)  * sy;
  let best = -1, bestD = 20;
  for (let i = 0; i < tearPoints.length; i++) {
    const d = Math.hypot(tearPoints[i].x - mx, tearPoints[i].y - my);
    if (d < bestD) { bestD = d; best = i; }
  }
  if (best >= 0) tearPoints.splice(best, 1);
});

// ============================================================
// File input events
// ============================================================
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
  e.target.value = '';
});

// Drag & drop
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});

// Paste from clipboard
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      loadFile(item.getAsFile());
      break;
    }
  }
});

// ============================================================
// GIF Export
// ============================================================
async function exportGIF() {
  if (!sourceImage) return;

  const btn = document.getElementById('btn-gif');
  const progressWrap = document.getElementById('progress-wrap');
  const progressLabel = document.getElementById('progress-label');
  const pbar = document.getElementById('pbar');

  btn.disabled = true;
  progressWrap.style.display = 'block';

  const totalFrames = p.gifFrames;
  const fps         = p.gifFps;
  const delay       = Math.max(20, Math.round(1000 / fps / p.gifSpeedMult));

  // Offscreen canvas (same size as preview)
  const offC = document.createElement('canvas');
  offC.width  = canvas.width;
  offC.height = canvas.height;
  const offCtx = offC.getContext('2d');

  // Simulate particle system from t=0
  const savedParticles = particles.slice();
  particles = [];

  // worker を Blob URL として生成（file:// でも動作するようにCDN不使用）
  const workerSrc  = document.getElementById('gif-worker-src').textContent;
  const workerBlob = new Blob([workerSrc], { type: 'application/javascript' });
  const workerUrl  = URL.createObjectURL(workerBlob);

  const gif = new GIF({
    workers:      2,
    quality:      p.gifQuality,
    width:        offC.width,
    height:       offC.height,
    workerScript: workerUrl,
  });

  // プレビューは約60fpsで物理更新するため、GIFフレームごとに同等のステップ数を踏む
  const stepsPerFrame = Math.max(1, Math.round(60 / fps * p.speedMult));

  function advancePhysics(steps) {
    for (let s = 0; s < steps; s++) {
      spawnParticles();
      particles = particles.filter(pt => pt.update());
      if (particles.length > MAX_PARTICLES) particles.splice(0, particles.length - MAX_PARTICLES);
    }
  }

  // Pre-seed: プレビューの30フレーム相当を事前に進める
  advancePhysics(30 * stepsPerFrame);

  // Generate frames
  for (let f = 0; f < totalFrames; f++) {
    advancePhysics(stepsPerFrame);

    renderToContext(offCtx, offC, (30 + f) * stepsPerFrame);
    gif.addFrame(offCtx, { copy: true, delay });

    const pct = Math.round((f + 1) / totalFrames * 50);
    progressLabel.textContent = `フレーム生成中… ${pct * 2}%`;
    pbar.style.width = pct + '%';

    if (f % 6 === 0) await new Promise(r => setTimeout(r, 0));
  }

  // Restore
  particles = savedParticles;

  gif.on('progress', ratio => {
    const pct = 50 + Math.round(ratio * 50);
    progressLabel.textContent = `エンコード中… ${pct}%`;
    pbar.style.width = pct + '%';
  });

  gif.on('finished', blob => {
    URL.revokeObjectURL(workerUrl); // worker Blob URL を解放

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'cry_effect.gif';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);

    btn.disabled = false;
    progressWrap.style.display = 'none';
    pbar.style.width = '0%';
  });

  gif.render();
}

// ============================================================
// PNG Export
// ============================================================
function exportPNG() {
  if (!sourceImage) return;
  const offC = document.createElement('canvas');
  offC.width  = canvas.width;
  offC.height = canvas.height;
  renderToContext(offC.getContext('2d'), offC, frameCount);
  const url = offC.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cry_effect.png';
  a.click();
}
